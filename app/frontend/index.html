<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center;
           align-items: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
    .card { background: #fff; border-radius: 8px; padding: 2rem 3rem;
            box-shadow: 0 4px 12px rgba(0,0,0,.1); text-align: center; max-width: 480px; }
    h1 { margin: 0 0 1rem; color: #2d3748; }
    #message { font-size: 1.25rem; color: #48bb78; font-weight: 600; }
    #ts { margin-top: .5rem; color: #718096; font-size: .9rem; }
    #error { color: #e53e3e; }
    button { margin-top: 1.5rem; padding: .5rem 1.5rem; border: none;
             border-radius: 4px; background: #4299e1; color: #fff;
             font-size: 1rem; cursor: pointer; }
    button:hover { background: #3182ce; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World</h1>
    <div id="message">Loading…</div>
    <div id="ts"></div>
    <div id="error"></div>
    <button onclick="fetchHello()">Refresh</button>
  </div>

  <script>
    async function fetchHello() {
      document.getElementById('message').textContent = 'Loading…';
      document.getElementById('ts').textContent = '';
      document.getElementById('error').textContent = '';
      try {
        const res = await fetch('/api/hello');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        document.getElementById('message').textContent = data.message;
        document.getElementById('ts').textContent = `Server time: ${data.ts}`;
      } catch (err) {
        document.getElementById('message').textContent = '';
        document.getElementById('error').textContent = `Error: ${err.message}`;
      }
    }
    fetchHello();
  </script>
</body>
</html>
